<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Протокол — единая система</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .win11-card {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 20px;
            margin-bottom: 12px;
        }

        .win11-button {
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .win11-button:hover {
            background-color: rgba(255, 255, 255, 1);
            transform: translateY(-1px);
        }

        .win11-button.primary { background-color: #0067c0; color: white; }
        .win11-button.success { background-color: #107c10; color: white; }

        .win11-button .button-message {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: inherit;
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .win11-button.show-message .button-message { opacity: 1; }
        .win11-button.show-message .button-text { opacity: 0; }

        .win11-input {
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            width: 100%;
        }

        .win11-input:focus {
            outline: none;
            border-color: #0067c0;
            box-shadow: 0 0 0 3px rgba(0, 103, 192, 0.2);
        }

        .win11-radio-group {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .win11-radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .win11-radio-group input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #0067c0;
        }

        .win11-textarea {
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            width: 100%;
            resize: vertical;
            font-family: monospace;
            min-height: 280px;
        }

        .win11-list {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            padding: 8px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .win11-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            font-size: 12px;
        }

        .win11-delete-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 22px;
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 6px;
        }

        .win11-delete-btn:hover {
            background-color: rgba(209, 52, 56, 0.1);
            color: #d13438;
        }

        .win11-badge {
            background-color: rgba(0, 103, 192, 0.1);
            color: #0067c0;
            padding: 4px 8px;
            border-radius: 16px;
            font-size: 12px;
        }

        .top-row {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .main-row {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .meta-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .file-info {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
            padding: 6px;
            background: rgba(255,255,255,0.5);
            border-radius: 6px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .compact-card { padding: 14px; }
        .unknown-id { color: #999; font-size: 18px; font-weight: 500; }

        /* Стили для блока просмотра (как в view.html) */
        .viewer-container {
            background: white;
            border-radius: 24px;
            padding: 1.8rem 2rem 2.5rem;
        }

        .viewer-filter-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: #f8fafd;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .date-filter {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            border: 1px solid #cbd9e8;
            border-radius: 30px;
            padding: 0.2rem 0.2rem 0.2rem 1rem;
        }

        .date-filter label {
            font-size: 0.85rem;
            color: #2b4f6e;
            font-weight: 500;
        }

        .date-input {
            border: none;
            border-radius: 30px;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            background: #f0f5fc;
            outline: none;
            width: 130px;
        }

        .sort-button {
            background: white;
            border: 1px solid #cbd9e8;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .sort-button:hover {
            background: #e1efff;
            border-color: #3070a5;
        }

        .clear-filters-btn {
            background: transparent;
            border: 1px solid #d8dde3;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .clear-filters-btn:hover {
            background: #ffeeee;
            border-color: #aa2647;
            color: #aa2647;
        }

        .filter-stats {
            font-size: 0.85rem;
            color: #5f7b9c;
            margin-left: auto;
        }

        .viewer-conclusions-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .conclusion-card {
            padding: 1.2rem;
            background: #fefefe;
            border-radius: 16px;
            border: 1px solid #e3ecf5;
            transition: all 0.2s;
        }

        .conclusion-card.editing {
            background: #fffef0;
            border-left: 4px solid #0067c0;
        }

        .row-patient { margin-bottom: 8px; }
        .patient-name {
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
        }
        .patient-name:hover { background-color: #e1efff; }
        .patient-edit {
            font-weight: 600;
            font-size: 1.1rem;
            padding: 6px 10px;
            border: 1px solid #0067c0;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
        }

        .row-modality-study-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        .left-group { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .modality-badge { font-size: 1.1rem; }
        .study-title { cursor: pointer; padding: 2px 6px; font-size: 0.9rem; }
        .study-title:hover { background: #e1efff; border-radius: 4px; }
        .study-title-edit { padding: 4px 8px; border: 1px solid #0067c0; border-radius: 6px; width: 200px; }
        .study-date { cursor: pointer; padding: 2px 6px; font-size: 0.85rem; }
        .study-date:hover { background: #e1efff; border-radius: 4px; }
        .date-edit-input { padding: 4px 8px; border: 1px solid #0067c0; border-radius: 6px; }
        .conclusion-id { font-size: 0.8rem; color: #666; }
        .action-buttons { display: flex; gap: 8px; }
        .edit-button, .save-button, .cancel-button, .copy-button {
            background: white;
            border: 1px solid #c9dbf0;
            border-radius: 8px;
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .save-button { background: #0067c0; color: white; border-color: #0067c0; }
        .conclusion-text {
            padding: 12px;
            background: #f9f9f9;
            border-radius: 10px;
            white-space: pre-wrap;
            cursor: pointer;
            border: 1px solid #e3ecf5;
        }
        .conclusion-text-edit {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid #0067c0;
            border-radius: 10px;
            font-family: monospace;
            resize: vertical;
        }
        .highlight {
            background-color: #ffeb3b;
            padding: 0 2px;
            border-radius: 3px;
            font-weight: 700;
        }
        .placeholder-message {
            text-align: center;
            padding: 3rem 2rem;
            background: #f1f7fd;
            border-radius: 36px;
            color: #55779b;
            font-size: 1rem;
            border: 2px dashed #b8cfe7;
        }
        .scroll-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            background: #0067c0;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 12px rgba(0,103,192,0.3);
            z-index: 100;
        }
        .scroll-to-top.visible { display: flex; }
        .export-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0067c0;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-size: 0.9rem;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Строка поиска */
        .viewer-search-container {
            margin-bottom: 20px;
        }
        .viewer-search-container input {
            width: 100%;
            padding: 12px 20px;
            font-size: 1rem;
            border: 1px solid #cbd9e8;
            border-radius: 30px;
            outline: none;
            background: white;
        }
        .viewer-search-container input:focus {
            border-color: #0067c0;
            box-shadow: 0 0 0 3px rgba(0,103,192,0.1);
        }
        .search-hint {
            font-size: 0.75rem;
            color: #6b8bb0;
            margin-top: 5px;
            margin-left: 15px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Верхний ряд: JSON блок и мета-поля -->
    <div class="top-row">
        <div class="win11-card compact-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <h3 style="font-size: 15px;">📁 Работа с JSON</h3>
                <span class="win11-badge" id="jsonStatusBadge">Файл не загружен</span>
            </div>
            <button id="loadDataFileBtn" class="win11-button" style="width: 100%;">
                <span class="button-text">📂 Загрузить файл</span>
                <span class="button-message"></span>
            </button>
            <input type="file" id="dataFileInput" accept=".json" style="display:none">
            <div class="file-info" id="dataFileInfo">⏺ Файл не загружен</div>
            <div style="margin: 8px 0; height:1px; background:#ddd;"></div>
            <div><div style="font-size:10px">Следующий ID</div><div id="nextIdDisplay" class="unknown-id">—</div></div>
            <div style="margin-top:6px"><div style="font-size:10px">Имя файла</div><div id="filenamePreview" style="font-size:11px">—</div></div>
        </div>

        <div class="win11-card compact-card">
            <div class="meta-row">
                <div class="win11-radio-group" id="modalityGroup">
                    <label><input type="radio" name="modality" value="rg" checked> 📦 РГ</label>
                    <label><input type="radio" name="modality" value="flg"> 🫁 ФЛГ</label>
                    <label><input type="radio" name="modality" value="ct"> 🖥️ КТ</label>
                    <label><input type="radio" name="modality" value="mri"> 🧠 МРТ</label>
                </div>
                <input type="date" id="dateField" class="win11-input">
            </div>
            <div class="meta-row">
                <input type="text" id="patientName" class="win11-input" placeholder="ФИО пациента">
                <input type="text" id="titleField" class="win11-input" placeholder="Название">
            </div>
        </div>
    </div>

    <!-- Основной ряд: сокращения + рабочее поле -->
    <div class="main-row">
        <div class="win11-card">
            <h3 class="section-title">➕ Добавить сокращение</h3>
            <input type="text" id="abbrInput" class="win11-input" placeholder="Сокращение" style="margin-bottom:10px">
            <input type="text" id="phraseInput" class="win11-input" placeholder="Полная фраза" style="margin-bottom:10px">
            <button id="addBtn" class="win11-button primary" style="width:100%">Добавить</button>

            <div style="margin-top:16px">
                <h3 class="section-title">📋 Мои сокращения</h3>
                <div id="abbreviationList" class="win11-list"></div>
                <button id="clearBtn" class="win11-button" style="width:100%; margin-top:8px">Очистить все</button>
            </div>
            <div style="margin:12px 0; height:1px; background:#ddd;"></div>
            <div style="display:flex; gap:10px">
                <button id="importBtn" class="win11-button" style="flex:1">📥 Импорт</button>
                <button id="exportBtn" class="win11-button" style="flex:1">📤 Экспорт</button>
            </div>
            <div id="autoSaveStatus" style="font-size:11px; text-align:center; margin-top:8px">⏺ Автосохранение каждые 20 мин</div>
        </div>

        <div class="win11-card">
            <h3 class="section-title">📝 Новое заключение</h3>
            <textarea id="textInput" class="win11-textarea" rows="8" placeholder="Введите текст заключения..."></textarea>
            <div style="margin-top:10px">
                <button id="submitBtn" class="win11-button success" style="width:100%">📨 Отправить в JSON</button>
            </div>
            <div class="button-group">
                <button class="win11-button" onclick="copy_to_clipboard('textInput')" style="flex:1">📋 Скопировать</button>
                <button id="exportTextBtn" class="win11-button" style="flex:1">💾 Сохранить текст</button>
            </div>
        </div>
    </div>

    <!-- БЛОК ПРОСМОТРА (как в view.html) -->
    <div class="win11-card" style="padding: 0; background: transparent; backdrop-filter: none; box-shadow: none;">
        <div class="viewer-container">
            <div class="viewer-search-container">
                <input type="text" id="headerSearchInput" placeholder="🔍 Поиск по пациентам, тексту, названию...">
                <div class="search-hint">🔎 Поиск работает в реальном времени</div>
            </div>

            <div class="viewer-filter-panel">
                <div class="date-filter">
                    <label>📅</label>
                    <input type="date" id="dateFilter" class="date-input">
                </div>
                <button id="sortByIdBtn" class="sort-button">⬇️🆔</button>
                <button id="clearFilterBtn" class="clear-filters-btn">✕ Сбросить</button>
                <span id="filterStats" class="filter-stats"></span>
            </div>

            <div id="conclusionsContainer" class="viewer-conclusions-list">
                <div class="placeholder-message">📭 Загрузите JSON-файл в левом верхнем углу</div>
            </div>
        </div>
    </div>
</div>

<button id="scrollToTopBtn" class="scroll-to-top">↑</button>

<script>
    // === ОСНОВНЫЕ ПЕРЕМЕННЫЕ ===
    let abbreviations = JSON.parse(localStorage.getItem('abbreviations')) || {};
    let jsonData = null;
    let jsonFileName = '';
    let nextId = null;

    // Переменные для просмотрщика (как в view.html)
    let currentConclusions = [];
    let filteredConclusions = [];
    let activeDateFilter = '';
    let sortByIdDesc = true;
    let editingIndex = -1;
    let editingDateIndex = -1;
    let searchQuery = '';
    let visibleCount = 50;
    let loadedCount = 0;
    let isLoading = false;
    let hasMore = true;

    // DOM элементы
    const abbrInput = document.getElementById('abbrInput');
    const phraseInput = document.getElementById('phraseInput');
    const addBtn = document.getElementById('addBtn');
    const clearBtn = document.getElementById('clearBtn');
    const abbrList = document.getElementById('abbreviationList');
    const textInput = document.getElementById('textInput');
    const exportBtn = document.getElementById('exportBtn');
    const exportTextBtn = document.getElementById('exportTextBtn');
    const importBtn = document.getElementById('importBtn');
    const fileInput = document.getElementById('fileInput');
    const modalityRadios = document.querySelectorAll('input[name="modality"]');
    const dateField = document.getElementById('dateField');
    const patientName = document.getElementById('patientName');
    const titleField = document.getElementById('titleField');
    const loadDataFileBtn = document.getElementById('loadDataFileBtn');
    const dataFileInput = document.getElementById('dataFileInput');
    const dataFileInfo = document.getElementById('dataFileInfo');
    const jsonStatusBadge = document.getElementById('jsonStatusBadge');
    const nextIdDisplay = document.getElementById('nextIdDisplay');
    const filenamePreview = document.getElementById('filenamePreview');
    const submitBtn = document.getElementById('submitBtn');
    const scrollToTopBtn = document.getElementById('scrollToTopBtn');
    
    // Элементы просмотрщика
    const container = document.getElementById('conclusionsContainer');
    const dateFilterInput = document.getElementById('dateFilter');
    const sortByIdBtnView = document.getElementById('sortByIdBtn');
    const clearFilterBtn = document.getElementById('clearFilterBtn');
    const filterStats = document.getElementById('filterStats');
    const headerSearchInput = document.getElementById('headerSearchInput');

    // === ФУНКЦИИ ОСНОВНОГО ПРИЛОЖЕНИЯ ===
    function formatDateTimeForFilename() {
        const now = new Date();
        const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
        const month = months[now.getMonth()];
        const day = String(now.getDate()).padStart(2,'0');
        const hours = String(now.getHours()).padStart(2,'0');
        const minutes = String(now.getMinutes()).padStart(2,'0');
        const seconds = String(now.getSeconds()).padStart(2,'0');
        return `${day}${month}_${hours}-${minutes}-${seconds}`;
    }

    function getModalityPrefixForExport() {
        if (!jsonData || jsonData.length === 0) return 'UNKNOWN';
        const lastItem = jsonData[jsonData.length - 1];
        const mod = String(lastItem.modality || '').toLowerCase().trim();
        if (mod.includes('mri') || mod.includes('мрт')) return 'MRT';
        if (mod.includes('ct') || mod.includes('кт')) return 'CT';
        if (mod.includes('rg') || mod.includes('рг')) return 'RG';
        if (mod.includes('flg') || mod.includes('флг')) return 'FLG';
        return 'UNKNOWN';
    }

    function setTodayDate() {
        dateField.value = new Date().toISOString().slice(0,10);
    }

    function showButtonMessage(button, message, isError = false) {
        const msgSpan = button.querySelector('.button-message');
        if(!msgSpan) return;
        msgSpan.textContent = message;
        button.classList.add('show-message');
        if(isError) button.classList.add('error-message');
        setTimeout(() => {
            button.classList.remove('show-message');
            button.classList.remove('error-message');
        }, 2000);
    }

    function getSelectedModality() {
        for(let r of modalityRadios) if(r.checked) return r.value;
        return 'rg';
    }

    function getSelectedModalityText() {
        for(let r of modalityRadios) if(r.checked) {
            return r.parentElement.textContent.trim().replace(/[🖥️🧠📦🫁\s]/g,'').trim();
        }
        return 'РГ';
    }

    const modalityPrefixMap = { 'rg':'RG', 'flg':'FLG', 'ct':'CT', 'mri':'MRI' };
    const modalityJsonMap = { 'rg':'rg', 'flg':'flg', 'ct':'ct', 'mri':'mri' };
    const prefixToModalityMap = { 'RG':'rg', 'FLG':'flg', 'CT':'ct', 'MRI':'mri' };

    function formatFilenameWithModality(modality) {
        const now = new Date();
        const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
        const month = months[now.getMonth()];
        const day = String(now.getDate()).padStart(2,'0');
        const hms = `${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}-${String(now.getSeconds()).padStart(2,'0')}`;
        return `${modalityPrefixMap[modality]}___${day}${month}_${hms}`;
    }

    function updateFilenamePreview() {
        filenamePreview.textContent = formatFilenameWithModality(getSelectedModality()) + '.json';
    }

    function updateNextIdDisplay() {
        nextIdDisplay.textContent = nextId === null ? '—' : nextId;
    }

    function getPrefixFromFilename(filename) {
        let match = filename.match(/^([A-Z]+)___/i);
        if(!match) match = filename.match(/^([A-Z]+)_/i);
        return match ? match[1].toUpperCase() : null;
    }

    function setModalityByPrefix(prefix) {
        const modality = prefixToModalityMap[prefix];
        if(modality) {
            for(let r of modalityRadios) if(r.value === modality) r.checked = true;
            updateFilenamePreview();
            return true;
        }
        return false;
    }

    // АВТОЭКСПОРТ JSON НА ДИСК
    function saveJsonToDisk() {
        if(!jsonData) return false;
        const now = new Date();
        const day = String(now.getDate()).padStart(2, '0');
        const months = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
        const month = months[now.getMonth()];
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const prefix = getModalityPrefixForExport();
        const filename = `${prefix}___${day}${month}_${hours}-${minutes}-${seconds}.json`;
        
        const dataStr = JSON.stringify(jsonData, null, 2);
        const blob = new Blob([dataStr], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        return true;
    }

    // ЗАГРУЗКА JSON
    function loadDataFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if(Array.isArray(data)) {
                    jsonData = data;
                    jsonFileName = file.name;
                    const maxId = jsonData.reduce((max,item) => Math.max(max, item.id || 0), 0);
                    nextId = maxId + 1;
                    dataFileInfo.innerHTML = `<span style="color:#107c10;">✅ Загружен: ${jsonFileName}</span>`;
                    jsonStatusBadge.textContent = 'Файл загружен';
                    updateNextIdDisplay();
                    const prefix = getPrefixFromFilename(file.name);
                    if(prefix) setModalityByPrefix(prefix);
                    showButtonMessage(loadDataFileBtn, `✓ Загружено ${data.length} записей`);
                    
                    // Обновляем просмотрщик
                    currentConclusions = jsonData.map(item => normalizeItem(item));
                    updateDisplay();
                } else throw new Error('Файл должен быть массивом');
            } catch(err) {
                showButtonMessage(loadDataFileBtn, '✗ Ошибка', true);
                jsonData = null;
                nextId = null;
                dataFileInfo.innerHTML = '<span style="color:#d13438;">❌ Ошибка загрузки</span>';
                jsonStatusBadge.textContent = 'Ошибка';
                updateNextIdDisplay();
                currentConclusions = [];
                updateDisplay();
            }
        };
        reader.readAsText(file);
    }

    // Нормализация данных для просмотрщика
    function normalizeItem(item) {
        return {
            id: item.id || item.identifier || item.номер || item.ID || Date.now(),
            patient: item.patient || item.patient_name || item.name || item.fio || item.ФИО || 'Без имени',
            text: item.text || item.conclusion || item.заключение || item.description || 'Нет текста',
            modality: item.modality || item.modalnost || item.модальность || item.method || '',
            title: item.title || item.study_name || item.study || item.исследование || item.название || '',
            date: item.date || item.study_date || item.дата || item.исследован || ''
        };
    }

    function getModalityDisplay(modalityRaw) {
        if (!modalityRaw) return '📦';
        const mod = String(modalityRaw).toLowerCase().trim();
        if (mod.includes('мрт') || mod.includes('mri')) return '🧠';
        if (mod.includes('рг') || mod.includes('rg')) return '📦';
        if (mod.includes('кт') || mod.includes('ct')) return '🖥️';
        if (mod.includes('флг') || mod.includes('flg')) return '🫁';
        return '🔬';
    }

    function formatDate(dateStr) {
        if (!dateStr || dateStr === '—') return '—';
        const match = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (match) return `${match[3]}.${match[2]}.${match[1]}`;
        return dateStr;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function highlightText(text, query) {
        if (!query.trim() || !text) return escapeHtml(text);
        const keywords = query.toLowerCase().split(/\s+/).filter(k => k.length > 0);
        if (keywords.length === 0) return escapeHtml(text);
        let result = escapeHtml(text);
        const sortedKeywords = [...keywords].sort((a, b) => b.length - a.length);
        for (const keyword of sortedKeywords) {
            try {
                const regex = new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
                result = result.replace(regex, match => `<span class="highlight">${match}</span>`);
            } catch(e) {}
        }
        return result;
    }

    function matchesSearch(item, query) {
        if (!query.trim()) return true;
        const keywords = query.toLowerCase().split(/\s+/).filter(k => k.length > 0);
        const searchableText = [
            item.patient, item.text, item.title, item.modality
        ].join(' ').toLowerCase();
        return keywords.every(keyword => searchableText.includes(keyword));
    }

    function sortConclusions(conclusions) {
        return [...conclusions].sort((a, b) => {
            const idA = String(a.id || '');
            const idB = String(b.id || '');
            if (sortByIdDesc) return idB.localeCompare(idA, undefined, { numeric: true });
            return idA.localeCompare(idB, undefined, { numeric: true });
        });
    }

    function filterConclusions() {
        let filtered = currentConclusions;
        if (activeDateFilter) {
            filtered = filtered.filter(item => item.date === activeDateFilter);
        }
        if (searchQuery.trim()) {
            filtered = filtered.filter(item => matchesSearch(item, searchQuery));
        }
        return sortConclusions(filtered);
    }

    function saveDateEdit(index, newDate) {
        if (index === -1 || !newDate) return;
        const item = filteredConclusions[index];
        const originalIndex = currentConclusions.findIndex(orig => String(orig.id) === String(item.id));
        if (originalIndex !== -1) {
            currentConclusions[originalIndex].date = newDate;
            // Обновляем jsonData
            const jsonIndex = jsonData.findIndex(j => String(j.id) === String(item.id));
            if (jsonIndex !== -1) jsonData[jsonIndex].date = newDate;
        }
        editingDateIndex = -1;
        updateDisplay();
        saveJsonToDisk();
    }

    function saveEdit(index, newPatient, newTitle, newText, newDate) {
        if (index === -1) return;
        const item = filteredConclusions[index];
        const originalIndex = currentConclusions.findIndex(orig => String(orig.id) === String(item.id));
        if (originalIndex !== -1) {
            if (newPatient !== undefined) currentConclusions[originalIndex].patient = newPatient;
            if (newTitle !== undefined) currentConclusions[originalIndex].title = newTitle;
            if (newText !== undefined) currentConclusions[originalIndex].text = newText;
            if (newDate !== undefined) currentConclusions[originalIndex].date = newDate;
            
            // Обновляем jsonData
            const jsonIndex = jsonData.findIndex(j => String(j.id) === String(item.id));
            if (jsonIndex !== -1) {
                if (newPatient !== undefined) jsonData[jsonIndex].patient = newPatient;
                if (newTitle !== undefined) jsonData[jsonIndex].title = newTitle;
                if (newText !== undefined) jsonData[jsonIndex].text = newText;
                if (newDate !== undefined) jsonData[jsonIndex].date = newDate;
            }
        }
        editingIndex = -1;
        updateDisplay();
        saveJsonToDisk();
        showNotification(`Запись ${item.id} обновлена`);
    }

    function startEditing(index) {
        editingIndex = index;
        editingDateIndex = -1;
        renderConclusions(filteredConclusions);
    }

    function startDateEdit(index) {
        editingDateIndex = index;
        editingIndex = -1;
        renderConclusions(filteredConclusions);
    }

    function cancelEditing() {
        editingIndex = -1;
        editingDateIndex = -1;
        renderConclusions(filteredConclusions);
    }

    function appendConclusionToContainer(item, index) {
        const modalityDisplay = getModalityDisplay(item.modality);
        const safeId = escapeHtml(String(item.id));
        const safeDate = formatDate(item.date);
        const highlightedPatient = highlightText(item.patient, searchQuery);
        const highlightedTitle = highlightText(item.title || '', searchQuery);
        const highlightedText = highlightText(item.text, searchQuery);
        
        const isDateEditing = (editingDateIndex === index);
        const dateHtml = isDateEditing 
            ? `<input type="date" class="date-edit-input" id="date-edit-${index}" value="${item.date || ''}">`
            : `<span class="study-date" ondblclick="window.startDateEdit(${index})">📅 ${safeDate}</span>`;
        
        const cardHtml = `
            <div class="conclusion-card" data-index="${index}">
                <div class="row-patient">
                    <span class="patient-name" ondblclick="window.startEditItem(${index})">${highlightedPatient}</span>
                </div>
                <div class="row-modality-study-actions">
                    <div class="left-group">
                        <span class="modality-badge">${modalityDisplay}</span>
                        <span class="study-title" ondblclick="window.startEditItem(${index})">${highlightedTitle || '—'}</span>
                        ${dateHtml}
                        <span class="conclusion-id">🆔 ${safeId}</span>
                    </div>
                    <div class="action-buttons">
                        <button class="edit-button" onclick="window.startEditItem(${index})">✏️ Редактировать</button>
                        <button class="copy-button" data-copy-text="${escapeHtml(item.text).replace(/"/g, '&quot;')}">📋 Копировать</button>
                    </div>
                </div>
                <div class="conclusion-text" ondblclick="window.startEditItem(${index})">${highlightedText}</div>
            </div>
        `;
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = cardHtml;
        container.appendChild(tempDiv.firstElementChild);
    }

    function renderConclusions(conclusions) {
        container.innerHTML = '';
        if (!conclusions || conclusions.length === 0) {
            container.innerHTML = `<div class="placeholder-message">🔍 Ничего не найдено</div>`;
            return;
        }
        
        if (editingIndex !== -1 && editingDateIndex === -1) {
            // Режим полного редактирования
            for (let i = 0; i < conclusions.length; i++) {
                const item = conclusions[i];
                const modalityDisplay = getModalityDisplay(item.modality);
                const safeId = escapeHtml(String(item.id));
                const safeDate = formatDate(item.date);
                const safePatient = escapeHtml(item.patient);
                const safeText = escapeHtml(item.text);
                const safeTitle = escapeHtml(item.title || '');
                
                if (editingIndex === i) {
                    const editHtml = `
                        <div class="conclusion-card editing" data-index="${i}">
                            <div class="row-patient">
                                <input type="text" class="patient-edit" id="edit-patient-${i}" value="${safePatient}">
                            </div>
                            <div class="row-modality-study-actions">
                                <div class="left-group">
                                    <span class="modality-badge">${modalityDisplay}</span>
                                    <input type="text" class="study-title-edit" id="edit-title-${i}" value="${safeTitle}">
                                    <input type="date" class="date-edit-input" id="edit-date-${i}" value="${item.date || ''}">
                                    <span class="conclusion-id">🆔 ${safeId}</span>
                                </div>
                                <div class="action-buttons">
                                    <button class="save-button" onclick="window.saveEditItem(${i})">💾 Сохранить</button>
                                    <button class="cancel-button" onclick="window.cancelEditItem()">✕ Отмена</button>
                                </div>
                            </div>
                            <textarea class="conclusion-text-edit" id="edit-text-${i}">${safeText}</textarea>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', editHtml);
                } else {
                    const highlightedPatient = highlightText(item.patient, searchQuery);
                    const highlightedTitle = highlightText(item.title || '', searchQuery);
                    const highlightedText = highlightText(item.text, searchQuery);
                    const cardHtml = `
                        <div class="conclusion-card" data-index="${i}">
                            <div class="row-patient">
                                <span class="patient-name" ondblclick="window.startEditItem(${i})">${highlightedPatient}</span>
                            </div>
                            <div class="row-modality-study-actions">
                                <div class="left-group">
                                    <span class="modality-badge">${modalityDisplay}</span>
                                    <span class="study-title" ondblclick="window.startEditItem(${i})">${highlightedTitle || '—'}</span>
                                    <span class="study-date" ondblclick="window.startDateEdit(${i})">📅 ${safeDate}</span>
                                    <span class="conclusion-id">🆔 ${safeId}</span>
                                </div>
                                <div class="action-buttons">
                                    <button class="edit-button" onclick="window.startEditItem(${i})">✏️ Редактировать</button>
                                    <button class="copy-button" data-copy-text="${escapeHtml(item.text).replace(/"/g, '&quot;')}">📋 Копировать</button>
                                </div>
                            </div>
                            <div class="conclusion-text" ondblclick="window.startEditItem(${i})">${highlightedText}</div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHtml);
                }
            }
        } else {
            // Обычный режим или режим редактирования даты
            for (let i = 0; i < conclusions.length; i++) {
                appendConclusionToContainer(conclusions[i], i);
            }
        }
        
        setupCopyButtons();
        
        if (editingDateIndex !== -1 && editingIndex === -1) {
            const dateInput = document.getElementById(`date-edit-${editingDateIndex}`);
            if (dateInput) {
                const saveDate = () => saveDateEdit(editingDateIndex, dateInput.value);
                dateInput.addEventListener('blur', saveDate);
                dateInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') saveDate(); });
            }
        }
    }

    function loadMore() {
        if (isLoading || !hasMore) return;
        const total = filteredConclusions.length;
        if (loadedCount >= total) { hasMore = false; return; }
        isLoading = true;
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'loading-indicator';
        loadingDiv.id = 'loading-indicator';
        loadingDiv.innerHTML = '<span class="loading-spinner"></span> Загрузка...';
        container.appendChild(loadingDiv);
        setTimeout(() => {
            const newCount = Math.min(loadedCount + visibleCount, total);
            for (let i = loadedCount; i < newCount; i++) {
                appendConclusionToContainer(filteredConclusions[i], i);
            }
            loadedCount = newCount;
            const indicator = document.getElementById('loading-indicator');
            if (indicator) indicator.remove();
            isLoading = false;
            if (loadedCount >= total) hasMore = false;
            setupCopyButtons();
        }, 100);
    }

    function handleScroll() {
        if (!hasMore || isLoading) return;
        const scrollPosition = window.scrollY + window.innerHeight;
        const pageHeight = document.documentElement.scrollHeight;
        if (scrollPosition >= pageHeight - 200) loadMore();
    }

    function setupCopyButtons() {
        document.querySelectorAll('.copy-button').forEach(button => {
            button.removeEventListener('click', button.clickHandler);
            button.clickHandler = function(e) {
                e.stopPropagation();
                const textToCopy = this.getAttribute('data-copy-text');
                if (!textToCopy) return;
                navigator.clipboard.writeText(textToCopy).then(() => {
                    const originalText = this.innerHTML;
                    this.innerHTML = '✓ Скопировано';
                    this.classList.add('copied');
                    setTimeout(() => {
                        this.innerHTML = originalText;
                        this.classList.remove('copied');
                    }, 1500);
                }).catch(() => alert('Не удалось скопировать текст'));
            };
            button.addEventListener('click', button.clickHandler);
        });
    }

    function updateDisplay() {
        if (currentConclusions.length === 0) {
            container.innerHTML = `<div class="placeholder-message">📭 Загрузите JSON-файл с заключениями</div>`;
            filterStats.textContent = '';
            return;
        }
        filteredConclusions = filterConclusions();
        filterStats.textContent = `${filteredConclusions.length} / ${currentConclusions.length}`;
        loadedCount = 0;
        hasMore = true;
        isLoading = false;
        renderConclusions(filteredConclusions);
    }

    // ДОБАВЛЕНИЕ НОВОЙ ЗАПИСИ
    function submitToJson() {
        if(!jsonData) {
            showButtonMessage(submitBtn, '✗ Сначала загрузите файл', true);
            return;
        }
        const text = textInput.value.trim();
        if(!text) {
            showButtonMessage(submitBtn, '✗ Текст пустой', true);
            return;
        }
        let title = titleField.value.trim();
        if(!title) {
            const modalityText = getSelectedModalityText();
            const formattedDate = dateField.value.split('-').reverse().slice(0,2).join('.');
            title = `${modalityText} от ${formattedDate}`;
        }
        const selectedModality = getSelectedModality();
        const modalityForJson = modalityJsonMap[selectedModality];
        const newEntry = {
            id: nextId,
            title: title,
            text: text,
            modality: modalityForJson,
            patient: patientName.value.trim() || '',
            date: dateField.value
        };
        jsonData.push(newEntry);
        nextId++;
        updateNextIdDisplay();
        textInput.value = '';
        titleField.value = '';
        setTodayDate();
        patientName.value = '';
        
        // Обновляем просмотрщик
        currentConclusions = jsonData.map(item => normalizeItem(item));
        updateDisplay();
        saveJsonToDisk();
        showButtonMessage(submitBtn, `✓ ID: ${nextId-1} сохранен`);
    }

    function showNotification(msg) {
        const div = document.createElement('div');
        div.textContent = `✅ ${msg}`;
        div.className = 'export-notification';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2000);
    }

    // === ОСТАЛЬНЫЕ ФУНКЦИИ ===
    function renderAbbreviations() {
        abbrList.innerHTML = '';
        for(let [abbr, phrase] of Object.entries(abbreviations)) {
            const div = document.createElement('div');
            div.className = 'win11-list-item';
            div.innerHTML = `<span>${abbr} → ${phrase}</span><button class="win11-delete-btn" data-abbr="${abbr}">×</button>`;
            div.querySelector('.win11-delete-btn').onclick = () => {
                delete abbreviations[abbr];
                localStorage.setItem('abbreviations', JSON.stringify(abbreviations));
                renderAbbreviations();
            };
            abbrList.appendChild(div);
        }
    }

    function addAbbreviation() {
        const abbr = abbrInput.value.trim();
        const phrase = phraseInput.value.trim();
        if(abbr && phrase) {
            abbreviations[abbr] = phrase;
            localStorage.setItem('abbreviations', JSON.stringify(abbreviations));
            renderAbbreviations();
            abbrInput.value = '';
            phraseInput.value = '';
            showButtonMessage(addBtn, '✓ Добавлено');
        } else showButtonMessage(addBtn, '✗ Заполните поля', true);
    }

    function clearAbbreviations() {
        if(confirm('Очистить все сокращения?')) {
            abbreviations = {};
            localStorage.setItem('abbreviations', '{}');
            renderAbbreviations();
            showButtonMessage(clearBtn, '✓ Очищено');
        }
    }

    function exportAbbreviations() {
        const data = JSON.stringify(abbreviations, null, 2);
        const blob = new Blob([data], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `abbreviations_${formatDateTimeForFilename()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showButtonMessage(exportBtn, `✓ ${Object.keys(abbreviations).length} экспортировано`);
    }

    function importAbbreviations(file) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const imported = JSON.parse(e.target.result);
                if(typeof imported === 'object' && imported !== null && !Array.isArray(imported)) {
                    Object.assign(abbreviations, imported);
                    localStorage.setItem('abbreviations', JSON.stringify(abbreviations));
                    renderAbbreviations();
                    showButtonMessage(importBtn, `✓ Импортировано ${Object.keys(imported).length}`);
                } else throw new Error();
            } catch(err) { showButtonMessage(importBtn, '✗ Ошибка', true); }
        };
        reader.readAsText(file);
    }

    function exportText() {
        const text = textInput.value.trim();
        if(!text) { showButtonMessage(exportTextBtn, '✗ Текст пуст', true); return; }
        const blob = new Blob([text], {type:'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `text_${formatDateTimeForFilename()}.txt`;
        a.click();
        URL.revokeObjectURL(url);
        showButtonMessage(exportTextBtn, '✓ Сохранено');
    }

    function autoSaveText() { if(textInput.value.trim()) exportText(); }
    
    function copy_to_clipboard(id) {
        const el = document.getElementById(id);
        el.select();
        document.execCommand('copy');
        const btn = event?.target?.closest('.win11-button');
        if(btn) showButtonMessage(btn, '✓ Скопировано');
    }
    window.copy_to_clipboard = copy_to_clipboard;
    
    // Глобальные функции для вызова из onclick
    window.startEditItem = startEditing;
    window.startDateEdit = startDateEdit;
    window.cancelEditItem = cancelEditing;
    window.saveEditItem = function(index) {
        const patientInput = document.getElementById(`edit-patient-${index}`);
        const titleInput = document.getElementById(`edit-title-${index}`);
        const textInputEl = document.getElementById(`edit-text-${index}`);
        const dateInputEl = document.getElementById(`edit-date-${index}`);
        saveEdit(index, 
            patientInput?.value, 
            titleInput?.value, 
            textInputEl?.value,
            dateInputEl?.value
        );
    };

    // === ИНИЦИАЛИЗАЦИЯ ===
    function init() {
        setTodayDate();
        updateFilenamePreview();
        renderAbbreviations();
        setInterval(updateFilenamePreview, 1000);
        setInterval(autoSaveText, 20*60*1000);
        
        loadDataFileBtn.onclick = () => dataFileInput.click();
        dataFileInput.onchange = (e) => { if(e.target.files.length) loadDataFile(e.target.files[0]); dataFileInput.value = ''; };
        submitBtn.onclick = submitToJson;
        exportTextBtn.onclick = exportText;
        addBtn.onclick = addAbbreviation;
        clearBtn.onclick = clearAbbreviations;
        exportBtn.onclick = exportAbbreviations;
        importBtn.onclick = () => fileInput.click();
        fileInput.onchange = (e) => { if(e.target.files.length) importAbbreviations(e.target.files[0]); fileInput.value = ''; };
        modalityRadios.forEach(r => r.addEventListener('change', updateFilenamePreview));
        
        // Настройка фильтров просмотрщика
        dateFilterInput.addEventListener('change', (e) => {
            activeDateFilter = e.target.value;
            editingIndex = -1;
            editingDateIndex = -1;
            updateDisplay();
        });
        
        sortByIdBtnView.addEventListener('click', () => {
            sortByIdDesc = !sortByIdDesc;
            sortByIdBtnView.innerHTML = sortByIdDesc ? '⬇️🆔' : '⬆️🆔';
            editingIndex = -1;
            editingDateIndex = -1;
            updateDisplay();
        });
        
        clearFilterBtn.addEventListener('click', () => {
            activeDateFilter = '';
            dateFilterInput.value = '';
            headerSearchInput.value = '';
            searchQuery = '';
            editingIndex = -1;
            editingDateIndex = -1;
            updateDisplay();
        });
        
        let searchTimeout;
        headerSearchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchQuery = e.target.value;
                editingIndex = -1;
                editingDateIndex = -1;
                updateDisplay();
            }, 300);
        });
        
        // Скролл
        window.addEventListener('scroll', handleScroll);
        window.addEventListener('scroll', () => {
            if(window.scrollY > 300) scrollToTopBtn.classList.add('visible');
            else scrollToTopBtn.classList.remove('visible');
        });
        scrollToTopBtn.onclick = () => window.scrollTo({top:0, behavior:'smooth'});
        
        currentConclusions = [];
        updateDisplay();
    }
    
    init();
</script>
</body>
</html>
