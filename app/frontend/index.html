<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система сокращений</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0 auto;
            padding: 10px;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .column {
            flex: 1;
            max-width: 200px;
        }

        .column2 {
            flex: 2;
        }

        input,
        button,
        select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            font-size: 18px;
        }

        button {
            background-color: #bbd1ff;
            color: rgb(92, 92, 92);
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #FFE5B3;
        }

        .abbreviation-list {
            border: 1px solid #ddd;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 11px;
        }

        .abbreviation-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        .delete-btn {
            background-color: #c5c5c5;
            padding: 2px 5px;
        }

        .clear-btn {
            background-color: #c5c5c5;
            margin-top: 10px;
        }

        .import-export {
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .file-input {
            display: none;
        }

        .auto-save-status {
            font-size: 12px;
            color: #666;
            margin: 0px;
            text-align: center;
        }

        .zag {
            font-size: 11px;
            margin-top: 5px;
        }

        .copyTextBtn {
            width: 48%;
            margin-right: 2%;
        }

        .exportTextBtn {
            width: 48%;
        }
        
        .submitBtn {
            width: 100%;
            margin-top: 10px;
            background-color: #4CAF50;
            color: white;
        }
        
        .submitBtn:hover {
            background-color: #45a049;
        }
        
        .file-info {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
            word-break: break-all;
        }

        .meta-fields {
            display: grid;
            grid-template-columns: 1.5fr 1fr 2fr 1.5fr;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        .meta-fields input[type="date"],
        .meta-fields input[type="text"] {
            margin-bottom: 0;
            height: 38px;
        }

        .meta-fields input[type="date"] {
            font-family: Arial, sans-serif;
        }
        
        .radio-group {
            display: flex;
            gap: 15px;
            background-color: #f5f5f5;
            padding: 8px;
            border-radius: 5px;
            height: 38px;
            align-items: center;
            box-sizing: border-box;
        }
        
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .radio-group input[type="radio"] {
            width: auto;
            margin: 0;
            margin-right: 2px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="column">
            <p class="zag">Добавить сокращение</p>
            <input type="text" id="abbrInput" placeholder="Сокращение (например, 'пж')">
            <input type="text" id="phraseInput" placeholder="Полная фраза (например, 'пожалуйста')">
            <button id="addBtn">Добавить</button>

            <p class="zag">Мои сокращения</p>
            <div id="abbreviationList" class="abbreviation-list"></div>
            <button id="clearBtn" class="clear-btn">Очистить</button>

            <div class="import-export">
                <button id="importBtn">Импорт</button>
                <button id="exportBtn">Экспорт</button>
                <input type="file" id="fileInput" class="file-input" accept=".json">
                <div id="autoSaveStatus" class="auto-save-status"></div>
            </div>
            
            <!-- Кнопка для загрузки JSON-файла с данными -->
            <p class="zag">Работа с JSON</p>
            <button id="loadDataFileBtn">Загрузить JSON для отправки</button>
            <input type="file" id="dataFileInput" class="file-input" accept=".json">
            <div id="dataFileInfo" class="file-info">Файл не загружен</div>
        </div>

        <div class="column2">
            <!-- Поля над текстовым полем -->
            <div class="meta-fields">
                <!-- Radio buttons для модальности с эмодзи -->
                <div class="radio-group" id="modalityGroup">
                    <label>
                        <input type="radio" name="modality" value="ct" checked> 🖥️ КТ
                    </label>
                    <label>
                        <input type="radio" name="modality" value="mr"> 🧠 МРТ
                    </label>
                    <label>
                        <input type="radio" name="modality" value="rg"> 🩻 РГ
                    </label>
                </div>
                
                <input type="date" id="dateField" value="">
                
                <input type="text" id="patientName" placeholder="ФИО пациента (необязательно)">
                
                <input type="text" id="titleField" value=".." onfocus="clearDefaultText(this)">
            </div>
            
            <p class="zag">Текстовое поле</p>
            <textarea id="textInput" rows="20"
                placeholder="Введите текст здесь... Сокращения заменяются при нажатии пробела или Enter."></textarea>
            
            <div class="button-group">
                <button class="copyTextBtn" onclick="copy_to_clipboard('textInput');">Скопировать</button>
                <button class="exportTextBtn" id="exportTextBtn">Сохранить</button>
            </div>
            
            <!-- Кнопка отправки -->
            <button id="submitBtn" class="submitBtn">Отправить в JSON</button>
            <button id="replaceBtn" hidden>Заменить все сокращения</button>
        </div>
    </div>

    <script>
        // Загрузка сокращений из localStorage
        let abbreviations = JSON.parse(localStorage.getItem('abbreviations')) || {};
        let autoSaveInterval;
        const AUTO_SAVE_INTERVAL = 30 * 60 * 1000; // 30 минут в миллисекундах

        // Переменные для работы с JSON-файлом
        let jsonData = null;
        let jsonFileName = '';
        let nextId = 1001;

        // Элементы DOM
        const abbrInput = document.getElementById('abbrInput');
        const phraseInput = document.getElementById('phraseInput');
        const addBtn = document.getElementById('addBtn');
        const clearBtn = document.getElementById('clearBtn');
        const abbrList = document.getElementById('abbreviationList');
        const textInput = document.getElementById('textInput');
        const replaceBtn = document.getElementById('replaceBtn');
        const exportBtn = document.getElementById('exportBtn');
        const exportTextBtn = document.getElementById('exportTextBtn');
        const importBtn = document.getElementById('importBtn');
        const fileInput = document.getElementById('fileInput');
        const autoSaveStatus = document.getElementById('autoSaveStatus');
        
        // Новые элементы
        const modalityRadios = document.querySelectorAll('input[name="modality"]');
        const dateField = document.getElementById('dateField');
        const patientName = document.getElementById('patientName');
        const titleField = document.getElementById('titleField');
        
        // Элементы для работы с JSON
        const loadDataFileBtn = document.getElementById('loadDataFileBtn');
        const dataFileInput = document.getElementById('dataFileInput');
        const dataFileInfo = document.getElementById('dataFileInfo');
        const submitBtn = document.getElementById('submitBtn');

        // Установка сегодняшней даты в поле даты
        function setTodayDate() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            dateField.value = `${year}-${month}-${day}`;
        }

        // Функция для форматирования даты и времени для имени файла
        function formatFilenameDate() {
            const now = new Date();
            
            // Месяц: 3-буквенное сокращение на английском
            const months = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
            const month = months[now.getMonth()];
            
            // День
            const day = now.getDate();
            
            // Часы и минуты
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            return `pr_${day}${month}_${hours}-${minutes}`;
        }

        // Функция для очистки поля "Название" при фокусе
        function clearDefaultText(element) {
            if (element.value === '..') {
                element.value = '';
            }
        }

        // Получение выбранной модальности
        function getSelectedModality() {
            for (const radio of modalityRadios) {
                if (radio.checked) {
                    return radio.value;
                }
            }
            return 'ct'; // По умолчанию
        }

        // Получение текста выбранной модальности с эмодзи для title
        function getSelectedModalityText() {
            for (const radio of modalityRadios) {
                if (radio.checked) {
                    // Получаем текст метки (эмодзи + текст)
                    return radio.parentElement.textContent.trim();
                }
            }
            return '🖥️ КТ'; // По умолчанию
        }

        // Отображение списка сокращений
        function renderAbbreviations() {
            abbrList.innerHTML = '';

            for (const [abbr, phrase] of Object.entries(abbreviations)) {
                const item = document.createElement('div');
                item.className = 'abbreviation-item';

                const text = document.createElement('span');
                text.textContent = `${abbr} → ${phrase}`;

                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '×';
                deleteBtn.className = 'delete-btn';
                deleteBtn.onclick = () => deleteAbbreviation(abbr);

                item.appendChild(text);
                item.appendChild(deleteBtn);
                abbrList.appendChild(item);
            }
        }

        // Добавление нового сокращения
        function addAbbreviation() {
            const abbr = abbrInput.value.trim();
            const phrase = phraseInput.value.trim();

            if (abbr && phrase) {
                abbreviations[abbr] = phrase;
                saveAbbreviations();

                abbrInput.value = '';
                phraseInput.value = '';

                renderAbbreviations();
            } else {
                alert('Пожалуйста, заполните оба поля!');
            }
        }

        // Очистка всех сокращений
        function clearAbbreviations() {
            if (confirm('Вы уверены, что хотите очистить весь список сокращений?')) {
                abbreviations = {};
                saveAbbreviations();
                renderAbbreviations();
            }
        }

        // Сохранение сокращений в localStorage
        function saveAbbreviations() {
            localStorage.setItem('abbreviations', JSON.stringify(abbreviations));
        }

        // Удаление сокращения
        function deleteAbbreviation(abbr) {
            delete abbreviations[abbr];
            saveAbbreviations();
            renderAbbreviations();
        }

        // Замена сокращений при нажатии пробела или Enter
        function replaceOnKeyPress(event) {
            if (event.key === ' ' || event.key === 'Enter') {
                event.preventDefault();

                const text = textInput.value;
                const cursorPos = textInput.selectionStart;

                // Находим последнее слово
                const textBeforeCursor = text.substring(0, cursorPos);
                const lastSpaceIndex = Math.max(
                    textBeforeCursor.lastIndexOf(' '),
                    textBeforeCursor.lastIndexOf('\n')
                );
                const lastWord = textBeforeCursor.substring(lastSpaceIndex + 1);

                // Проверяем есть ли такое сокращение
                if (abbreviations.hasOwnProperty(lastWord)) {
                    // Формируем замену
                    let replacement = abbreviations[lastWord];
                    let appendChar = '';

                    if (event.key === ' ') {
                        appendChar = ' ';
                    } else if (event.key === 'Enter') {
                        replacement += '\n';
                    }

                    // Собираем новый текст
                    const newText = textBeforeCursor.substring(0, lastSpaceIndex + 1) +
                        replacement +
                        appendChar +
                        text.substring(cursorPos);

                    // Устанавливаем новый текст
                    textInput.value = newText;

                    // Позиция курсора после замены
                    const newCursorPos = lastSpaceIndex + 1 + replacement.length + appendChar.length;
                    textInput.setSelectionRange(newCursorPos, newCursorPos);
                } else {
                    // Если не было замены, вставляем оригинальный символ
                    if (event.key === ' ') {
                        document.execCommand('insertText', false, ' ');
                    } else if (event.key === 'Enter') {
                        document.execCommand('insertText', false, '\n');
                    }
                }
            }
        }

        // Замена всех сокращений в тексте
        function replaceAllAbbreviations() {
            let text = textInput.value;

            // Сортируем сокращения по длине (от самых длинных к самым коротким)
            const sortedAbbrs = Object.keys(abbreviations).sort((a, b) => b.length - a.length);

            for (const abbr of sortedAbbrs) {
                const regex = new RegExp(`\\b${escapeRegExp(abbr)}\\b`, 'g');
                text = text.replace(regex, abbreviations[abbr]);
            }

            textInput.value = text;
            textInput.selectionStart = text.length;
            textInput.selectionEnd = text.length;
        }

        // Экранирование специальных символов
        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // Экспорт сокращений в JSON
        function exportAbbreviations() {
            const data = JSON.stringify(abbreviations, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = 'сокращения.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Экспорт текста в TXT
        function exportText() {
            const text = textInput.value;
            if (!text.trim()) {
                alert('Текст для сохранения пуст!');
                return;
            }

            const date = new Date();
            const dateStr = formatDate(date);
            const filename = `текст_${dateStr}.txt`;

            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            updateAutoSaveStatus(`Текст сохранен в ${filename}`);
        }

        // Форматирование даты для имени файла (только дата и часы)
        function formatDate(date) {
            const pad = num => num.toString().padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}_${pad(date.getHours())}`;
        }

        // Автосохранение текста
        function autoSaveText() {
            const text = textInput.value;
            if (text.trim()) {
                exportText();
            }
        }

        // Обновление статуса автосохранения
        function updateAutoSaveStatus(message) {
            autoSaveStatus.textContent = message;
            setTimeout(() => {
                autoSaveStatus.textContent = `Автосохранение каждые ${AUTO_SAVE_INTERVAL / 60000} минут`;
            }, 3000);
        }

        // Импорт сокращений
        function importAbbreviations(file) {
            const reader = new FileReader();

            reader.onload = function (e) {
                try {
                    const imported = JSON.parse(e.target.result);

                    if (typeof imported !== 'object' || imported === null) {
                        throw new Error('Неверный формат файла');
                    }

                    abbreviations = { ...abbreviations, ...imported };
                    saveAbbreviations();
                    renderAbbreviations();
                    alert(`Успешно импортировано ${Object.keys(imported).length} сокращений`);
                } catch (error) {
                    alert(`Ошибка импорта: ${error.message}`);
                }
            };

            reader.readAsText(file);
        }

        // Загрузка JSON-файла с данными
        function loadDataFile(file) {
            const reader = new FileReader();

            reader.onload = function (e) {
                try {
                    jsonData = JSON.parse(e.target.result);
                    jsonFileName = file.name;
                    
                    // Определяем следующий доступный ID
                    if (Array.isArray(jsonData)) {
                        const maxId = jsonData.reduce((max, item) => {
                            return item.id && item.id > max ? item.id : max;
                        }, 0);
                        nextId = maxId + 1;
                    } else {
                        jsonData = [];
                        nextId = 1001;
                    }
                    
                    dataFileInfo.textContent = `Загружен: ${jsonFileName} (ID: ${nextId})`;
                    alert(`Файл успешно загружен! Следующий ID: ${nextId}`);
                } catch (error) {
                    alert(`Ошибка загрузки файла: ${error.message}`);
                    jsonData = null;
                    dataFileInfo.textContent = 'Ошибка загрузки файла';
                }
            };

            reader.readAsText(file);
        }

        // Отправка данных в JSON
        function submitToJson() {
            // Проверяем, загружен ли файл
            if (!jsonData) {
                alert('Сначала загрузите JSON-файл для отправки!');
                return;
            }

            // Проверяем, заполнено ли текстовое поле
            const text = textInput.value.trim();
            if (!text) {
                alert('Текстовое поле пустое!');
                return;
            }

            // Получаем значение поля "Название"
            let title = titleField.value.trim();
            if (title === '..' || title === '') {
                // Формируем название по умолчанию (С ЭМОДЗИ)
                const modalityText = getSelectedModalityText();
                const date = dateField.value;
                const formattedDate = date.split('-').reverse().slice(0, 2).join('.');
                title = `${modalityText} от ${formattedDate}`;
            }

            // Получаем выбранную модальность (сохраняем для использования после отправки)
            const selectedModality = getSelectedModality();

            // Создаем новый объект (С ЭМОДЗИ В TITLE)
            const newEntry = {
                id: nextId,
                title: title, // С эмодзи
                text: text,
                modality: selectedModality, // Латинские значения: ct, mr, rg
                patient: patientName.value.trim() || '',
                date: dateField.value
            };

            // Добавляем в массив
            jsonData.push(newEntry);

            // Сохраняем файл
            const data = JSON.stringify(jsonData, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            
            // Генерируем имя файла в формате pr_14mar_23-18
            const filename = formatFilenameDate() + '.json';
            a.download = filename;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            // Увеличиваем ID для следующей записи
            nextId++;

            // Очищаем поля (НО НЕ СБРАСЫВАЕМ МОДАЛЬНОСТЬ)
            textInput.value = '';
            patientName.value = '';
            titleField.value = '..';
            // НЕ сбрасываем выбранную модальность
            // modalityRadios остаются с текущим выбранным значением
            setTodayDate();

            // Обновляем информацию о файле
            dataFileInfo.textContent = `Загружен: ${jsonFileName} (ID: ${nextId})`;
            
            alert(`Данные успешно добавлены! Файл сохранен как: ${filename}`);
        }

        // Инициализация автосохранения
        function initAutoSave() {
            if (autoSaveInterval) clearInterval(autoSaveInterval);
            autoSaveInterval = setInterval(autoSaveText, AUTO_SAVE_INTERVAL);
            updateAutoSaveStatus(`Автосохранение каждые ${AUTO_SAVE_INTERVAL / 60000} минут`);
            setTimeout(autoSaveText, AUTO_SAVE_INTERVAL);
        }

        // Обработчики событий
        addBtn.addEventListener('click', addAbbreviation);
        clearBtn.addEventListener('click', clearAbbreviations);
        replaceBtn.addEventListener('click', replaceAllAbbreviations);
        exportBtn.addEventListener('click', exportAbbreviations);
        exportTextBtn.addEventListener('click', exportText);
        importBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                importAbbreviations(e.target.files[0]);
                fileInput.value = '';
            }
        });
        
        // Обработчики для работы с JSON-файлом
        loadDataFileBtn.addEventListener('click', () => dataFileInput.click());
        dataFileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                loadDataFile(e.target.files[0]);
                dataFileInput.value = '';
            }
        });
        
        submitBtn.addEventListener('click', submitToJson);
        
        textInput.addEventListener('keydown', replaceOnKeyPress);

        // УДАЛЕНО: автоматическая вставка даты в текстовое поле

        function copy_to_clipboard(textInput) {
            document.getElementById(textInput).select();
            document.execCommand('copy');
        }

        // Установка сегодняшней даты при загрузке
        setTodayDate();

        // Инициализация
        renderAbbreviations();
        initAutoSave();
    </script>
</body>

</html>
